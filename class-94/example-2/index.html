<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #ececec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 950px;
        }

        h1 {
            text-align: center;
            font-size: 60px;
            margin-bottom: 40px;
            font-weight: bold;
        }

        /* Input Section */
        .input-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .input-section input {
            flex: 1;
            padding: 22px;
            border: 4px solid blue;
            border-radius: 20px;
            font-size: 28px;
            outline: none;
            background: white;
        }

        .add-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid green;
            background: white;
            color: green;
            font-size: 40px;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: green;
            color: white;
        }

        /* Task List */
        .task {
            background: white;
            border: 4px solid green;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-text {
            font-size: 32px;
            word-break: break-word;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        button {
            border: none;
            padding: 18px 28px;
            border-radius: 15px;
            font-size: 22px;
            cursor: pointer;
            color: white;
        }

        .done-btn {
            background: green;
        }

        .archieve-btn {
            background: #9da9a0;
            color: white;
        }

        .delete-btn {
            background: #ff2e1f;
        }

        .archieved-btn {
            background-color: gray;
            opacity: 0.1px;
        }

        .completed {
            text-decoration: line-through;
            color: green;

        }
        .archieved {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>To-Do App</h1>

        <!-- Input -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a task">
            <button class="add-btn" id="addBtn">+</button>

        </div>

        <!-- Task List -->
        <div id="taskList"></div>

        <!-- Archieved Task-->
        <div id="ArchievedTask"></div>
    </div>

    <script src="index.js"></script>

</body>
</html>
