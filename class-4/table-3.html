<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 3th example</title>
</head>
<body>
    <main>
  <h1>Common Software  tools</h1>  
  <section>
    <p>This table lists common Software tools used by develpers</p>
    <table border="1">
        <!--table header tag-->
        <thead>
            <tr>
                <th>Software</th>
                <th>Type</th>
                <th>Monthly cost</th>
            </tr>
        </thead>
        <!--table body-->
        <tbody>
            <!--table header raw-->
            <tr>
                <td>Github</td>
                <td>Code Hosting</td>
                <td>$0</td>
            </tr>
            <tr>
                <td>Figma</td>
                <td>Design tool</td>
                <td>$12</td>
            </tr>
        </tbody>
        <!--table footer-->
        <tfoot>
            <tr>
                <td colspan="3">Available</td>
            </tr>
        </tfoot>
    </table>
  </section>
  </main>
</body>
</html>
